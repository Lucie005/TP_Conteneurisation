services:
  database:
    image: postgres:15-alpine
    # Pas de ports exposés : la BDD reste isolée en interne
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  api:
    build: ./api
    ports:
      - "3000:3000"
    depends_on:
      - database
    restart: on-failure
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3000

  frontend:
    build: ./frontend
    ports:
      - "8080:80"

  adminer:
    image: adminer
    ports:
      - "8081:8080" # 8080 est le port par défaut à l'intérieur du container Adminer
    depends_on:
      - database
    environment:
      ADMINER_DEFAULT_SERVER: database

volumes:
  db_data: